[Service]
Restart=no
TimeoutStartSec=900
RestartSec=10

EnvironmentFile=%h/.config/containers/systemd/shared.env
WorkingDirectory=%h/.config/containers/systemd

[Container]
AutoUpdate=registry
UserNS=keep-id:uid=65534,gid=65534
NoNewPrivileges=true

Network=caddy.network

[Install]
WantedBy=default.target