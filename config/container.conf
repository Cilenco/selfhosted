[Service]
Restart=no
TimeoutStartSec=900
RestartSec=10

WorkingDirectory=%h/.config/containers/systemd

Environment=VOLUMES_DIR=%h/.config/containers/volumes
Environment=MEDIA_DIR=%h/.config/containers/media

Environment=DOMAIN=
Environment=IP_ADDRESS=

[Container]
NoNewPrivileges=true

UserNS=keep-id:uid=65534,gid=65534
User=65534:65534
#ReadOnly=true

Pull=newer

[Install]
WantedBy=default.target
