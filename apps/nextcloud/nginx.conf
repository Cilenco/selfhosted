worker_processes  auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    client_max_body_size 10G;  # important for Nextcloud uploads

    upstream php-handler {
        server nextcloud-app:9000;  # service name of your FPM container
    }

    server {
        listen 8080;
        server_name _;

        root /var/www/html;
        index index.php index.html /index.php$request_uri;

        # Security headers (optional but recommended)
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-XSS-Protection "1; mode=block";
        add_header Referrer-Policy no-referrer;

        # Max upload size + timeouts
        fastcgi_buffers 64 4K;

        location = /robots.txt {
            allow all;
            log_not_found off;
            access_log off;
        }

        location = /.well-known/carddav {
            return 301 /remote.php/dav;
        }

        location = /.well-known/caldav {
            return 301 /remote.php/dav;
        }

        location /.well-known/acme-challenge {
            allow all;
        }

        location /.well-known/pki-validation {
            allow all;
        }

        # Deny access to hidden files
        location ~ /\.(?!well-known) {
            deny all;
        }

        # Main Nextcloud routing
        location / {
            rewrite ^ /index.php$request_uri;
        }

        # PHP handling
        location ~ \.php(?:$|/) {
            fastcgi_split_path_info ^(.+\.php)(/.*)$;
            set $path_info $fastcgi_path_info;

            try_files $fastcgi_script_name =404;

            include fastcgi_params;

            fastcgi_param HTTPS on;
            fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
            fastcgi_param HTTP_X_FORWARDED_HOST $host;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PATH_INFO $path_info;

            fastcgi_pass php-handler;
            fastcgi_intercept_errors on;
            fastcgi_request_buffering off;
        }

        # Static files
        location ~ \.(?:css|js|mjs|svg|gif|png|jpg|ico|wasm|tflite)$ {
            try_files $uri /index.php$request_uri;
            access_log off;
            expires 6M;
        }

        location ~ \.(?:woff2?|ttf|otf|eot)$ {
            try_files $uri /index.php$request_uri;
            access_log off;
            expires 7d;
        }
    }
}
