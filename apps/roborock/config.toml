[network]
stack_fqdn = "api-roborock.${DOMAIN}"
bind_host = "0.0.0.0"
mqtt_tls_port = 8881
https_port = 5555
region = "us"

[broker]
mode = "embedded"
mosquitto_binary = "mosquitto"
enable_topic_bridge = true
host = "127.0.0.1"
port = 18830

[storage]
data_dir = "/data"

[tls]
mode = "provided"
cert_file = "/data/certs/certificate.crt"
key_file = "/data/certs/certificate.key"

[admin]
