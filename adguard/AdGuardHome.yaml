http:
  address: 0.0.0.0:3000

dns:
  port: 5300
  use_private_ptr_resolvers: false
  rewrites:
    - domain: "domain.tld"
      answer: 127.0.0.1
    - domain: "*.domain.tld"
      answer: 127.0.0.1

tls:
  enabled: false
