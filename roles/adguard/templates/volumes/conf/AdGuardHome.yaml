http:
  address: 0.0.0.0:3000

dns:
  port: 5300
  use_private_ptr_resolvers: false
  rewrites:
    - domain: "{{ domain }}"
      answer: "{{ ansible_facts['default_ipv4']['address'] }}"
    - domain: "*.{{ domain }}"
      answer: "{{ ansible_facts['default_ipv4']['address'] }}"

tls:
  enabled: false
  #  server_name: ""
  port_dns_over_tls: 8530
  #  certificate_path: ""
  #  private_key_path: ""
