theme: auto

server:
  address: "tcp://:9091/"
  disable_healthcheck: false
  endpoints:
    enable_pprof: false
    enable_expvars: false

totp:
  issuer: '{{env "DOMAIN"}}'
  period: 30
  skew: 1

authentication_backend:
  refresh_interval: always
  password_reset:
    disable: false
  ldap:
    implementation: custom
    address: ldap://ldap:3890
    timeout: 5s
    start_tls: false
    base_dn: "dc=example,dc=com"
    users_filter: "(&(|({username_attribute}={input})({mail_attribute}={input}))(objectClass=person))"
    additional_users_dn: ou=people
    additional_groups_dn: ou=groups
    groups_filter: "(member={dn})"
    attributes:
      display_name: displayName
      username: uid
      group_name: cn
      mail: mail
    user: 'uid={{env "LDAP_USERNAME"}},ou=people,dc=example,dc=com'
    password: '{{env "LDAP_PASSWORD"}}'

identity_validation:
  reset_password:
    jwt_secret: '{{env "JWT_SECRET"}}'
    jwt_lifespan: "5 minutes"
    jwt_algorithm: "HS256"

access_control:
  default_policy: deny
  rules:
    - domain: '{{env "DOMAIN"}}'
      policy: bypass
    - domain: 'dns.{{env "DOMAIN"}}' # Adguard
      policy: one_factor
    - domain: 'home.{{env "DOMAIN"}}' # HomeAssistant
      policy: two_factor
    - domain: 'streaming.{{env "DOMAIN"}}' # Jellyfin
      policy: two_factor
    - domain: 'dancing.{{env "DOMAIN"}}' # Outline
      policy: two_factor
    - domain: 'cloud.{{env "DOMAIN"}}' # Nextcloud
      policy: two_factor

session:
  name: authelia_session
  secret: '{{env "SESSION_SECRET"}}'
  expiration: 1h
  inactivity: 5m
  cookies:
    - domain: 'auth.{{env "DOMAIN"}}'
      authelia_url: 'https://auth.{{env "DOMAIN"}}'
      #default_redirection_url: 'https://www.{{env "DOMAIN"}}'

regulation:
  max_retries: 3
  find_time: 10m
  ban_time: 12h

storage:
  encryption_key: '{{env "STORAGE_ENCRYPTION_KEY"}}'
  local:
    path: /config/db.sqlite3

identity_providers:
  oidc:
    hmac_secret: '{{env "OIDC_HMAC_SECRET"}}'
    jwks:
      - key: |
          {{ fileContent "/secrets/test_key.pem" | nindent 10 }}
    clients:
      - client_id: outline
        client_name: Outline
        client_secret: '{{ env "OUTLINE_CLIENT_SECRET"}}'
        authorization_policy: one_factor
        redirect_uris:
          - https://dancing.{{env "DOMAIN"}}/auth/oidc.callback
        scopes:
          - openid
          - offline_access
          - profile
          - email
        userinfo_signed_response_alg: "none"
        token_endpoint_auth_method: "client_secret_post"
      - client_id: nextcloud
        client_name: Nextcloud
        client_secret: '{{ env "NEXTCLOUD_CLIENT_SECRET"}}'
        authorization_policy: one_factor
        pkce_challenge_method: "S256"
        require_pkce: true
        redirect_uris:
          - https://cloud.{{env "DOMAIN"}}/index.php/apps/user_oidc/code
        scopes:
          - openid
          - groups
          - profile
          - email
        userinfo_signed_response_alg: "none"
        token_endpoint_auth_method: "client_secret_basic"
      - client_id: budget
        client_name: ActualBudget
        client_secret: '{{ env "ACTUAL_BUDGET_CLIENT_SECRET"}}'
        authorization_policy: one_factor
        redirect_uris:
          - https://budget.{{env "DOMAIN"}}/openid/callback
        scopes:
          - openid
          - groups
          - profile
          - email
        userinfo_signed_response_alg: "none"
        token_endpoint_auth_method: "client_secret_basic"

notifier:
  disable_startup_check: true
  smtp:
    username: '{{env "SMTP_USERNAME"}}'
    password: '{{env "SMTP_PASSWORD"}}'
    address: 'submissions://{{env "SMTP_HOST"}}:{{env "SMTP_PORT"}}'
    sender: 'Authelia <noreply@{{env "DOMAIN"}}>'
    subject: "{title}"
    disable_require_tls: false
    disable_starttls: false
