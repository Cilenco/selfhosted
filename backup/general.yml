# yaml-language-server: $schema=https://creativeprojects.github.io/resticprofile/jsonschema/config.json

base:
  initialize: true

  status-file: "{{ .Profile.Name }}-status.json"

  insecure-no-password: true
  #password-file: "password.txt"
  repository: "local:./backup"

  backup:
    verbose: true
    extended-status: true

    #send-after:
    #  method: POST
    #  url: "{{ .Env.NTFY_URL }}/backups"
    #  body: "Successfully backed up ${PROFILE_NAME}"
    #  headers:
    #    - name: Title
    #      value: "Created ${PROFILE_NAME} backup"
    #    - name: Tags
    #      value: tada

    #send-after-fail:
    #  method: POST
    #  url: "{{ .Env.NTFY_URL }}/backups"
    #  body: "${ERROR_STDERR}"
    #  headers:
    #    - name: Title
    #      value: "Backup of ${PROFILE_NAME} failed"
    #    - name: Tags
    #      value: warning

    schedule-permission: user
    schedule-lock-mode: default
    schedule:
      - "Mon..Sun *:00,15,30,45" # every 15 minutes on weekdays
      - "Mon..Sun 04:00" # every day at 4am in the morning

  retention:
    after-backup: true
    keep-daily: 30
