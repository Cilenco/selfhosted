name: Update HomeAssistant Image

on:
  schedule:
    - cron: "00 03 * * */1"
  workflow_dispatch:

jobs:
  check:
    name: check for new release of home assistant
    runs-on: ubuntu-latest
    outputs:
      needs-updating: ${{ (steps.check.outputs.needs-updating) }}

    steps:
      - name: Check if update available
        uses: lucacome/docker-image-update-checker@v1
        id: check
        with:
          base-image: homeassistant/home-assistant
          image: cilenco/homeassistant

  build:
    name: build new docker image
    if: ${{ needs.check.outputs.needs-updating == 'true' || (github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-latest
    needs: check
    steps:
      - name: Find latest version tag
        uses: oprypin/find-latest-tag@v1
        id: latest_version
        with:
          repository: home-assistant/core
          releases-only: true

      - name: Checkout
        uses: actions/checkout@v3

      # for multi architecture builds (x64, arm64, arm)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
        with:
          image: tonistiigi/binfmt:latest
          platforms: arm64,arm

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v3
        with:
          file: ./.customimages/homeassistant
          tags: |
            cilenco/homeassistant:latest
            cilenco/homeassistant:${{ steps.latest_version.outputs.tag }}
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
