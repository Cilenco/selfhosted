name: HomeAssistant Manual

on:
  workflow_dispatch:

jobs:
  build:
    name: build new docker image
    runs-on: ubuntu-latest
    steps:
      - name: Get Latest Image
        uses: shrink/actions-docker-latest-image@v1
        id: latest_image
        with:
          repository: docker.io/homeassistant/home-assistant

      - name: Checkout
        uses: actions/checkout@v3

      # for multi architecture builds (x64, arm64, arm)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
        with:
          image: tonistiigi/binfmt:latest
          platforms: arm64,arm

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v3
        with:
          context: ./.customimages/homeassistant
          tags: cilenco/homeassistant:latest,cilenco/homeassistant:${{ steps.latest_image.outputs.tag }}
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
