name: Update CaddyServer image

on:
  schedule:
    - cron: "00 03 * * */1"
  workflow_dispatch:

jobs:
  check:
    name: check for new release of caddy
    runs-on: ubuntu-latest
    outputs:
      needs-updating: ${{ (steps.check.outputs.needs-updating) || (github.event_name == 'workflow_dispatch') }}

    steps:
      - name: Check if update available
        uses: lucacome/docker-image-update-checker@v1
        id: check
        with:
          base-image: library/caddy:alpine
          image: cilenco/caddy-ionos-dns

  build:
    name: build new docker image
    if: needs.check.outputs.needs-updating == 'true'
    runs-on: ubuntu-latest
    needs: check
    steps:
      - name: Find latest version tag
        uses: oprypin/find-latest-tag@v1
        id: latest_version
        with:
          repository: caddyserver/caddy
          releases-only: true

      - name: Checkout
        uses: actions/checkout@v3

      # for multi architecture builds (x64, arm64, arm)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
        with:
          image: tonistiigi/binfmt:latest
          platforms: arm64,arm

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v3
        with:
          file: ./.customimages/caddy
          tags: |
            cilenco/caddy-ionos-dns:latest
            cilenco/caddy-ionos-dns${{ steps.latest_version.outputs.tag }}
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
