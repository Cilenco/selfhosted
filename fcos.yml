variant: fcos
version: 1.6.0

passwd:
  users:
    - name: admin
      ssh_authorized_keys_local:
        - id_ed25519.pub

storage:
  directories:
    # Quadlets dir
    - path: /var/home/admin/.config/containers/systemd
      user:
        name: admin
      group:
        name: admin
  trees:
    - local: quadlets
      path: /var/home/admin/.config/containers/systemd
  links:
    # Enable Podman auto updates
    - path: /var/home/admin/.config/systemd/user/timers.target.wants/podman-auto-update.timer
      target: /usr/lib/systemd/user/podman-auto-update.timer
      user:
        name: admin
      group:
        name: admin
  files:
    # Enable linger so containers can continue to run even after admin user logouts
    - path: /var/lib/systemd/linger/admin
    # Set machine hostname
    - path: /etc/hostname
      contents:
        inline: ${hostname}

systemd:
  units:
    - name: resolved.service
